name: Check flake

on:
  push:
    paths:
      - "**.nix"
      - "flake.lock"
      - ".github/workflows/check.yml"
      - ".github/actions/**/*"

jobs:
  check-flake:
    name: Check flake (${{ matrix.system }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Lix
        uses: ./.github/actions/install-lix
      - name: Check flake
        run: nix flake check

name: Check

on:
  push:
    paths:
      - "**.nix"
      - "**.lock"
      - ".github/actions/**/*"
      - ".github/workflows/check.yml"

jobs:
  check:
    name: Check (${{ matrix.system }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Lix
        uses: ./.github/actions/install-lix
      - name: Check
        runs: nix flake check

name: cleanup
run-name: Cleaning up old workflow runs

on:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  cleanup:
    name: Delete old workflow runs
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 6

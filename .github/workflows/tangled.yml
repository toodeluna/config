name: tangled
run-name: Push repository to Tangled
on: push

permissions:
  contents: read
  pull-requests: read

jobs:
  tangled:
    runs-on: ubuntu-latest

    steps:
      - uses: gwennlbh/to-tangled@v0.5
        with:
          knot: knot.toodeluna.net
          repo: toodeluna.net/config
          ssh-key: ${{ secrets.TANGLED_KEY }}
